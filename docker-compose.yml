services:
  backend:
    image: consensus-backend:latest
    container_name: consensus-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017
      - ALLOWED_ORIGIN=https://consensus.jrv.me
    ports:
      - 127.0.0.1:8080:8080
    depends_on:
      - mongo
    networks:
      - consensus

  frontend:
    image: consensus-frontend:latest
    container_name: consensus-frontend
    restart: unless-stopped
    ports:
      - 127.0.0.1:3000:3000
    networks:
      - consensus

  mongo:
    image: mongo:8
    container_name: consensus-mongo
    restart: unless-stopped
    volumes:
      - consensus-mongo-data:/data/db
    networks:
      - consensus

networks:
  consensus:

volumes:
  consensus-mongo-data:

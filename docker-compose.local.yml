services:
  nginx:
    image: nginx:1.27
    container_name: consensus-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 8080:8080
    depends_on:
      - backend
      - frontend
    networks:
      - frontend
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consensus-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017
      - ALLOWED_ORIGIN=http://localhost:8080
    depends_on:
      - mongo
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: consensus-frontend
    restart: unless-stopped
    stdin_open: true
    # Empty string → frontend uses same-origin relative URLs (goes through nginx → backend).
    environment:
      - NEXT_PUBLIC_API_ORIGIN=
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/hooks:/app/hooks
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/jsconfig.json:/app/jsconfig.json
      - ./frontend/components.json:/app/components.json
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/eslint.config.mjs:/app/eslint.config.mjs
    networks:
      - frontend

  mongo:
    image: mongo:8
    container_name: consensus-mongo
    restart: unless-stopped
    volumes:
      - consensus-mongo-data-local:/data/db
    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  consensus-mongo-data-local:
